    <line x1="151" y1="259" x2="134" y2="276"/>
    <line x1="259" y1="259" x2="276" y2="276"/>
  </g>
  <circle cx="205" cy="205" r="66" fill="url(#sun)"/>
  <!-- moln -->
  <g fill="url(#cloud)">
    <rect x="232" y="312" width="150" height="52" rx="26"/>
