    <line x1="281" y1="205" x2="305" y2="205"/>
    <line x1="129" y1="205" x2="105" y2="205"/>
    <line x1="205" y1="281" x2="205" y2="305"/>
    <line x1="259" y1="151" x2="276" y2="134"/>
