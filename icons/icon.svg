      <stop offset="0" stop-color="#1a2434"/>
      <stop offset="1" stop-color="#0c111b"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffd45c"/>
