<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brämhult väder · widget</title>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<style>
  :root {
    --bg1: #182234; --bg2: #0c111b; --card-border: #26313f;
    --ink: #e8edf2; --ink-2: #a6b2bf; --ink-3: #6e7c8b; --line: #26313f;
    --temp: #f0a24b; --rain: #4aa3e0; --wind: #63c281;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font: 15px/1.4 -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    color: var(--ink);
    background: radial-gradient(120% 120% at 20% 0%, var(--bg1), var(--bg2));
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center; padding: 12px;
  }
  .widget {
    width: 100%; max-width: 640px;
    background: linear-gradient(155deg, rgba(38,49,63,.55), rgba(12,17,27,.55));
    border: 1px solid var(--card-border); border-radius: 16px;
    padding: 16px 18px 14px; box-shadow: 0 10px 40px rgba(0,0,0,.35);
    backdrop-filter: blur(4px); overflow: hidden;
  }
  .whead { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .whead .name { font-weight: 700; font-size: 15px; }
  .whead .name small { color: var(--ink-3); font-weight: 500; font-size: 11.5px; margin-left: 6px; letter-spacing: .04em; }
  .whead .when { color: var(--ink-3); font-size: 12.5px; font-variant-numeric: tabular-nums; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .live { width: 7px; height: 7px; border-radius: 50%; background: var(--wind); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99,194,129,.5); } 70% { box-shadow: 0 0 0 6px rgba(99,194,129,0); } 100% { box-shadow: 0 0 0 0 rgba(99,194,129,0); } }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); }
  .cell { text-align: center; padding: 12px 4px; min-width: 0; border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
  @media (min-width: 461px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
    .cell:nth-child(-n+4) { border-top: none; }
    .cell:nth-child(4n+1) { border-left: none; }
  }
  @media (max-width: 460px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .cell:nth-child(-n+2) { border-top: none; }
    .cell:nth-child(odd) { border-left: none; }
  }

  .val { font-size: clamp(23px, 6.5vw, 33px); font-weight: 650; font-variant-numeric: tabular-nums; letter-spacing: -.02em; line-height: 1.05; display: inline-flex; align-items: baseline; gap: 3px; max-width: 100%; }
  .val .u { font-size: 13px; font-weight: 500; color: var(--ink-3); }
  .val.temp { color: var(--temp); }
  .lab { margin-top: 5px; font-size: 11.5px; color: var(--ink-3); letter-spacing: .02em; }
  .arrow { display: inline-block; color: var(--wind); font-size: .8em; }
  .um { color: var(--rain); font-size: .82em; margin-right: 1px; }
  .dim { color: var(--ink-3); }
  .foot { margin-top: 10px; text-align: right; }
  .foot a { color: var(--ink-3); font-size: 11px; text-decoration: none; }
  .foot a:hover { color: var(--ink-2); }
</style>
</head>
<body>
  <div class="widget" id="w">
    <div class="whead">
      <div class="name">Brämhult <small>IBRMHULT2</small></div>
      <div class="when"><span class="live"></span><span id="when">—</span></div>
    </div>
    <div class="grid">
      <div class="cell"><div class="val temp"><span id="temp">–</span><span class="u">°C</span></div><div class="lab">Temp</div></div>
      <div class="cell"><div class="val"><span id="wind">–</span><span class="u">m/s</span> <span class="arrow" id="warr">➤</span></div><div class="lab">Vind</div></div>
      <div class="cell"><div class="val"><span class="um">☂</span><span id="rain">–</span><span class="u">mm</span></div><div class="lab">Regn idag</div></div>
      <div class="cell"><div class="val"><span id="hum">–</span><span class="u">%</span></div><div class="lab">Luftfuktighet</div></div>
      <div class="cell"><div class="val" id="uv">–</div><div class="lab">UV-index</div></div>
      <div class="cell"><div class="val" id="lux">–</div><div class="lab">Ljus</div></div>
      <div class="cell"><div class="val" id="strk">–</div><div class="lab">Blixtar idag</div></div>
      <div class="cell"><div class="val"><span id="feels">–</span><span class="u">°C</span></div><div class="lab">Känns som</div></div>
    </div>
    <div class="foot"><a href="https://weather.rickmark.se" target="_blank" rel="noopener">weather.rickmark.se →</a></div>
  </div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const num = (v, d = 0) => (typeof v === "number" && isFinite(v))
  ? v.toLocaleString("sv-SE", { minimumFractionDigits: d, maximumFractionDigits: d }) : "–";
const DIRS = ["N","NNO","NO","ONO","O","OSO","SO","SSO","S","SSV","SV","VSV","V","VNV","NV","NNV"];
const whenText = (iso) => new Intl.DateTimeFormat("sv-SE", { timeZone: "Europe/Stockholm", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit", hour12: false }).format(iso ? new Date(iso) : new Date());
async function fetchJSON(u) { const r = await fetch(u, { cache: "no-store" }); if (!r.ok) throw 0; return r.json(); }

function paint(o) {
  $("temp").textContent = num(o.temp, 1);
  $("wind").textContent = num(o.wind != null ? o.wind / 3.6 : null, 1); // km/h → m/s
  if (o.windDir != null) { $("warr").style.transform = `rotate(${(o.windDir + 90) % 360}deg)`; $("warr").title = DIRS[Math.round(o.windDir / 22.5) % 16]; }
  else $("warr").style.display = "none";
  $("rain").textContent = num(o.rain, 1);
  $("hum").textContent = num(o.hum, 0);
  $("uv").textContent = o.uv != null ? num(o.uv, 0) : "–";
  if (o.lux == null) $("lux").innerHTML = '<span class="dim">–</span>';
  else if (o.lux < 30) $("lux").innerHTML = '<span class="dim" style="font-size:20px">Mörkt</span>';
  else $("lux").innerHTML = `${num(o.lux, 0)}<span class="u"> lux</span>`;
  $("strk").textContent = o.strikes != null ? num(o.strikes, 0) : "0";
  $("feels").textContent = num(o.feels != null ? o.feels : o.temp, 0);
  $("when").textContent = whenText(o.time);
}

async function load() {
  try {
    const a = await fetchJSON("/api/acurite");
    if (a.status === "ok" && a.atlas?.current?.temp != null) {
      const c = a.atlas.current;
      return paint({ temp: c.temp, wind: c.windAvg ?? c.windNow, windDir: c.windDir,
        rain: c.rainToday, hum: c.humidity, uv: a.atlas.uv, lux: a.atlas.lux,
        strikes: a.atlas.lightning?.dailyStrikes, feels: c.feelsLike, time: a.atlas.lastCheckIn });
    }
  } catch {}
  try {
    const w = await fetchJSON("/api/wu?e=current");
    const o = w.observations?.[0];
    if (o) return paint({ temp: o.metric.temp, wind: o.metric.windSpeed, windDir: o.winddir,
      rain: o.metric.precipTotal, hum: o.humidity, uv: o.uv, lux: null,
      strikes: null, feels: o.metric.temp >= 20 ? o.metric.heatIndex : o.metric.windChill, time: o.obsTimeLocal });
  } catch {}
}
load();
setInterval(load, 120000);
</script>
</body>
</html>
