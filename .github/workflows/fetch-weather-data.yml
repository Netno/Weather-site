name: Hämta väderdata

on:
  schedule:
    # 01:30 UTC = 02:30/03:30 svensk tid — säkert efter midnatt året om.
    # Hämtar gårdagens dygn till AcuRite-arkivet.
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-weather-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # OBS: Weather Underground-backfillen (scripts/fetch-history.mjs) är
      # avstängd med flit. WU-arkivet (data/daily/, data/hourly/) läses inte
      # längre av siten — period-/historikvyerna bygger helt på AcuRite-arkivet,
      # som redan täcker 2018→nu och hålls aktuellt av steget nedan. Den gamla
      # kronologiska WU-krypningen fyllde bara på data ingen läser och parkerade
      # historiken i 2023/2024. Vill man återuppta den finns steget i git-loggen.

      - name: Hämta myAcuRite-data till arkivet
        env:
          ACURITE_DATA_URL: ${{ secrets.ACURITE_DATA_URL }}
        run: node scripts/fetch-acurite.mjs

      - name: Committa och pusha arkivet
        # Körs även om hämtsteget failade — skriptet sparar alltid sin
        # framgång till disk, och delresultat får inte gå förlorade.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Ingen ny data att committa."
          else
            CURSOR=$(node -p "require('./data/acurite/manifest.json').lastFetched")
            git commit -m "Uppdatera väderarkivet t.o.m. $CURSOR"
            # main kan ha fått nya commits under den långa körningen —
            # rebasa och försök igen i stället för att tappa arkivet
            for i in 1 2 3 4 5; do
              if git push; then
                exit 0
              fi
              echo "Push misslyckades (försök $i) — rebasar mot main …"
              git pull --rebase origin main
              sleep $((i * 5))
            done
            echo "Push misslyckades efter 5 försök."
            exit 1
          fi
