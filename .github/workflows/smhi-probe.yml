name: SMHI-probe (tillfällig)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Prova nya SMHI snow1g-API:et
        run: |
          U="https://opendata-download-metfcst.smhi.se/api/category/snow1g/version/1/geotype/point/lon/13.01/lat/57.7216/data.json"
          echo "=== $U"
          code=$(curl -s -o /tmp/body -w "%{http_code}" -A "bramhult-vader/1.0" "$U")
          echo "HTTP $code"
          python3 - <<'PY'
          import json
          d = json.load(open("/tmp/body"))
          print("top-level keys:", list(d.keys()))
          for k in ("approvedTime","referenceTime","approved_time","reference_time"):
              if k in d: print(f"  {k}: {d[k]}")
          ts = d.get("timeSeries") or d.get("timeseries") or []
          print("timeSeries len:", len(ts))
          if ts:
              print("entry[0] keys:", list(ts[0].keys()))
              print("entry[0] (utan parameters):", {k:v for k,v in ts[0].items() if k!="parameters"})
              print("entry[-1] (utan parameters):", {k:v for k,v in ts[-1].items() if k!="parameters"})
              print("--- parametrar i första punkten ---")
              for p in ts[0].get("parameters", []):
                  print(f'  {p.get("name"):12} {str(p.get("unit","")):10} {p.get("values")}')
          PY
