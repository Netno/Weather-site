name: SMHI-probe (tillfällig)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Kolla driftsatt sida och API
        run: |
          SITE="https://weather-site-delta-ochre.vercel.app"
          echo "=== /api/smhi ==="
          code=$(curl -s -o /tmp/api -w "%{http_code}" "$SITE/api/smhi")
          echo "HTTP $code"
          python3 - <<'PY'
          import json
          try:
              d = json.load(open("/tmp/api"))
              print("referenceTime:", d.get("referenceTime"))
              print("hourly:", len(d.get("hourly", [])), "daily:", len(d.get("daily", [])))
              if d.get("hourly"): print("hourly[0]:", d["hourly"][0])
          except Exception as e:
              print("kunde inte parsa:", e); print(open("/tmp/api").read()[:200])
          PY
          echo; echo "=== index.html: vilken kod serverar Vercel? ==="
          curl -s "$SITE/" -o /tmp/idx
          for marker in selectForecastDay fcHourDays "fc-hours" "renderForecastDay" "Prognos"; do
            if grep -q "$marker" /tmp/idx; then echo "  har: $marker"; else echo "  SAKNAR: $marker"; fi
          done
          echo "index.html-storlek: $(wc -c </tmp/idx) byte"
