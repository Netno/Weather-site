name: SMHI-probe (tillfällig)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Prova nya SMHI snow1g-API:et
        run: |
          U="https://opendata-download-metfcst.smhi.se/api/category/snow1g/version/1/geotype/point/lon/13.01/lat/57.7216/data.json"
          echo "=== $U"
          code=$(curl -s -o /tmp/body -w "%{http_code}" -A "bramhult-vader/1.0" "$U")
          echo "HTTP $code"
          python3 - <<'PY'
          import json
          d = json.load(open("/tmp/body"))
          print("approvedTime:", d.get("approvedTime"))
          ts = d.get("timeSeries", [])
          print("timeSeries len:", len(ts))
          if ts:
              print("first validTime:", ts[0]["validTime"])
              print("last  validTime:", ts[-1]["validTime"])
              print("--- parametrar i första punkten ---")
              for p in ts[0]["parameters"]:
                  print(f'  {p["name"]:10} {p.get("unit",""):10} {p["values"][0]}')
          PY
