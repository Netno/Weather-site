name: SMHI-probe (tillfällig)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Vilka dagar är klickbara?
        run: |
          curl -s "https://weather-site-delta-ochre.vercel.app/api/smhi" -o /tmp/api
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone, timedelta
          d = json.load(open("/tmp/api"))
          # Efterlikna frontendens fcDay: svensk lokal tid (sommar = UTC+2)
          def sthlm(iso):
              t = datetime.fromisoformat(iso.replace("Z","+00:00")).astimezone(timezone(timedelta(hours=2)))
              return t.strftime("%Y-%m-%d")
          hourDays = sorted({ sthlm(r["time"]) for r in d["hourly"] })
          dailyDates = [x["date"] for x in d["daily"]]
          print("hourly-dagar (klickbara):", hourDays)
          print("daily-datum (visas):", dailyDates)
          pick = [dt for dt in dailyDates if dt in set(hourDays)]
          print(f"KLICKBARA dagar: {len(pick)} av {len(dailyDates)} ->", pick)
          PY
